name: Mesugak V2 CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Mesugak_V2/frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Mesugak_V2/functions/requirements.ci.txt

      - name: Run backend tests
        run: python -m unittest discover -s Mesugak_V2/functions/tests

      - name: Compile Python entry points
        run: >
          python -m py_compile
          Mesugak_V2/functions/main.py
          Mesugak_V2/functions/jobs/analyze_market.py
          Mesugak_V2/functions/jobs/rebalance.py
          Mesugak_V2/functions/jobs/apply_paper_orders.py
          Mesugak_V2/functions/jobs/run_paper_flow.py
          Mesugak_V2/functions/jobs/smoke_test_flow.py
          Mesugak_V2/functions/jobs/validate_scheduler_env.py
          Mesugak_V2/functions/jobs/emulator_smoke_flow.py

      - name: Run local smoke test
        run: python Mesugak_V2/functions/jobs/smoke_test_flow.py

      - name: Validate scheduler environment template
        run: python Mesugak_V2/functions/jobs/validate_scheduler_env.py

      - name: Install frontend dependencies
        working-directory: Mesugak_V2/frontend
        run: npm ci

      - name: Build frontend
        working-directory: Mesugak_V2/frontend
        run: npm run build
